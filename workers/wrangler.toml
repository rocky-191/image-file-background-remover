name = "image-bg-remover"
main = "index.js"
compatibility_date = "2024-01-01"

[site]
bucket = "./frontend/dist"

# 环境变量（部署时需要设置）
[vars]
# JWT 密钥
JWT_SECRET = "change-this-to-a-secure-random-string"

# Google OAuth（可选，需要登录功能时配置）
# GOOGLE_CLIENT_ID = ""
# GOOGLE_CLIENT_SECRET = ""

# Remove.bg API Key（必需）
# REMOVE_BG_API_KEY = ""

# PayPal API Credentials（需要支付功能时配置）
# PAYPAL_CLIENT_ID = ""
# PAYPAL_CLIENT_SECRET = ""

# D1 数据库（运行 wrangler d1 create image-bg-remover-db 后填入）
# [[d1_databases]]
# binding = "DB"
# database_name = "image-bg-remover-db"
# database_id = "your-database-id"
